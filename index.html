
  <!DOCTYPE html>
  <html lang="en">
    <head>
      
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Ecommerce platform with admin</title>
      <meta name="description" content="This eCommerce platform streamlines online shopping with user-friendly navigation, secure account creation, and an intuitive admin interface for managing products and pricing." />
      <link rel="icon" type="image/png" href="/new logo.png" />
      <meta name="robots" content="noindex, nofollow" />
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      <!-- SPA redirect: restore path saved by 404.html -->
      <script>
        (function() {
          var redirect = sessionStorage.getItem('spa-redirect');
          if (redirect) {
            sessionStorage.removeItem('spa-redirect');
            window.history.replaceState(null, null, redirect);
          }
        })();
      </script>
      
    </head>

    <body>
      
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
  </html>
